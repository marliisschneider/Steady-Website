<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steady Pipeline — Leads Board</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,380;9..144,450;9..144,550;9..144,600&family=Inter:wght@400;500;600;650;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="steady2.css">
  <link rel="canonical" href="https://marliisschneider.github.io/Steady-Website/leads.html">
  <meta name="theme-color" content="#14352a">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    .kanban {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }
    .kanban-col-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #14352a;
      color: #f7f4ec;
      font-weight: 650;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }
    .kanban-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(247, 244, 236, 0.18);
      color: #f7f4ec;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .kanban-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 14px;
      min-height: 24px;
    }
    .lead-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 3px rgba(20, 53, 42, 0.08), 0 4px 14px rgba(20, 53, 42, 0.06);
      border: 1px solid rgba(20, 53, 42, 0.06);
    }
    .lead-card h3 {
      font-family: Inter, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin: 0 0 4px;
      color: #14352a;
    }
    .lead-card .lead-email {
      display: block;
      font-size: 0.86rem;
      color: #40573f;
      word-break: break-all;
      margin-bottom: 10px;
    }
    .lead-card .lead-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.78rem;
      color: #6b7d6a;
    }
    .lead-card .lead-source {
      background: #eef2e9;
      color: #2d4a3e;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 600;
    }
    .kanban-empty {
      font-size: 0.84rem;
      color: #8a978a;
      padding: 10px 4px;
    }
    @media (max-width: 980px) {
      .kanban { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 600px) {
      .kanban { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand"><span class="dot"></span>Steady</a>
      <button class="nav-toggle" aria-label="Menu" onclick="document.getElementById('navlinks').classList.toggle('open')">☰</button>
      <div class="nav-links" id="navlinks">
        <a href="index.html">Home</a>
        <a href="coaching.html">Coaching</a>
        <a href="learn.html">Learn</a>
        <a href="recipes.html">Recipes</a>
        <a href="quiz.html">Quiz</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="cta">Book a call</a>
      </div>
    </div>
  </nav>

  <section class="article-hero">
    <div class="wrap narrow">
      <p class="eyebrow">Leads Board</p>
      <h1>Steady Pipeline</h1>
      <p class="lede" id="lead-count">Loading leads…</p>
    </div>
  </section>

  <section>
    <div class="wrap">
      <div class="kanban" id="kanban" hidden>
        <div class="kanban-col" data-status="new">
          <div class="kanban-col-head">New <span class="kanban-count">0</span></div>
          <div class="kanban-cards"></div>
        </div>
        <div class="kanban-col" data-status="contacted">
          <div class="kanban-col-head">Contacted <span class="kanban-count">0</span></div>
          <div class="kanban-cards"></div>
        </div>
        <div class="kanban-col" data-status="booked">
          <div class="kanban-col-head">Booked <span class="kanban-count">0</span></div>
          <div class="kanban-cards"></div>
        </div>
        <div class="kanban-col" data-status="client">
          <div class="kanban-col-head">Client <span class="kanban-count">0</span></div>
          <div class="kanban-cards"></div>
        </div>
      </div>
      <p class="form-msg" id="leads-msg" role="status" aria-live="polite"></p>
    </div>
  </section>

  <footer class="footer">
    <div class="wrap">
      <div class="footer-bottom">
        <span>© 2026 Steady Nutrition Coaching</span>
        <span>Internal dashboard — not linked from the public site.</span>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    (function () {
      "use strict";

      var STATUSES = ["new", "contacted", "booked", "client"];
      var countEl = document.getElementById("lead-count");
      var kanbanEl = document.getElementById("kanban");
      var msgEl = document.getElementById("leads-msg");

      function fail(text) {
        countEl.textContent = "Couldn't load leads.";
        msgEl.textContent = text;
        msgEl.className = "form-msg err";
      }

      function fmtDate(iso) {
        if (!iso) return "—";
        var d = new Date(iso);
        if (isNaN(d)) return iso;
        return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      }

      var client = null;
      try {
        client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      } catch (e) {
        console.error("Steady leads board: could not init Supabase", e);
      }
      if (!client) {
        fail("Supabase client failed to load — check your connection and config.js.");
        return;
      }

      client
        .from("steady_leads")
        .select("name, email, source, status, created_at")
        .order("created_at", { ascending: false })
        .then(function (res) {
          if (res.error) {
            console.error("Steady leads board: select failed", res.error);
            fail("Query failed: " + res.error.message +
              " (if this says permission denied, the table's RLS policy doesn't allow reads with the publishable key).");
            return;
          }

          var rows = res.data || [];
          countEl.textContent = rows.length === 1 ? "1 lead total" : rows.length + " leads total";

          STATUSES.forEach(function (status) {
            var col = kanbanEl.querySelector('.kanban-col[data-status="' + status + '"]');
            var cardsEl = col.querySelector(".kanban-cards");
            var leads = rows.filter(function (r) {
              return (r.status || "new").toLowerCase() === status;
            });

            col.querySelector(".kanban-count").textContent = leads.length;

            if (!leads.length) {
              var empty = document.createElement("p");
              empty.className = "kanban-empty";
              empty.textContent = "No leads here yet.";
              cardsEl.appendChild(empty);
              return;
            }

            leads.forEach(function (lead) {
              var card = document.createElement("div");
              card.className = "lead-card";

              var name = document.createElement("h3");
              name.textContent = lead.name || "—";
              card.appendChild(name);

              var email = document.createElement("span");
              email.className = "lead-email";
              email.textContent = lead.email || "—";
              card.appendChild(email);

              var meta = document.createElement("div");
              meta.className = "lead-meta";

              var source = document.createElement("span");
              source.className = "lead-source";
              source.textContent = lead.source || "—";
              meta.appendChild(source);

              var date = document.createElement("span");
              date.textContent = fmtDate(lead.created_at);
              meta.appendChild(date);

              card.appendChild(meta);
              cardsEl.appendChild(card);
            });
          });

          kanbanEl.hidden = false;
        });
    })();
  </script>
</body>
</html>
